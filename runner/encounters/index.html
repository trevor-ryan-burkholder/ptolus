<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Encounter Generator — Ptolus Runner</title>
<link rel="stylesheet" href="../shared/ui.css">
</head>
<body>
<div class="runner-main">
  <div class="panel">
    <h2>Encounter</h2>
    <label for="source">Source</label>
    <select id="source">
      <option value="db" selected>Monster Database (EL-targeted combat)</option>
      <option value="tables">Ptolus Tables (canonical / zone)</option>
    </select>

    <div id="db-controls">
      <label for="region">Region</label>
      <select id="region">
        <option value="ptolus_streets">Ptolus Streets</option>
        <option value="ptolus_undercity">Ptolus Undercity</option>
        <option value="ptolus_necropolis">Ptolus Necropolis</option>
        <option value="ptolus_dungeon" selected>The Dungeon</option>
        <option value="ptolus_docks">Ptolus Docks</option>
        <option value="ptolus_spire">Ptolus Spire</option>
        <option value="dungeon">Generic Dungeon</option>
        <option value="sewer">Sewer</option>
        <option value="wilderness_temperate">Wilderness (Temperate)</option>
        <option value="wilderness_cold">Wilderness (Cold)</option>
        <option value="wilderness_warm">Wilderness (Warm)</option>
        <option value="wilderness_coastal">Coastal / Aquatic</option>
        <option value="underground">Underground</option>
        <option value="urban">Urban (generic)</option>
        <option value="planar_lower">Lower Planes</option>
      </select>

      <label for="plevel">Party Level (1–20)</label>
      <input type="number" id="plevel" min="1" max="20" value="4">

      <label for="offset">Target EL offset</label>
      <select id="offset">
        <option value="-2">−2 (easy)</option>
        <option value="-1">−1</option>
        <option value="0" selected>±0 (even)</option>
        <option value="1">+1</option>
        <option value="2">+2 (tough)</option>
      </select>
    </div>

    <div id="table-controls" style="display:none;">
      <label for="zone">Zone / Table</label>
      <select id="zone">
        <option value="street" selected>City Street (by district)</option>
        <option value="sewer">Sewers (d20)</option>
        <option value="labyrinth">Ghul's Labyrinth (d12)</option>
        <option value="necropolis">Necropolis (night)</option>
      </select>
      <div id="street-extra">
        <label for="district">District</label>
        <select id="district"></select>
        <label for="time">Time</label>
        <select id="time"><option value="day" selected>Day</option><option value="night">Night</option></select>
      </div>
    </div>

    <button class="primary" id="roll">Roll Encounter</button>
    <button id="tocombat" style="width:100%;margin-top:8px;">⚔ Send last to Combat Tracker</button>
    <div class="hint" id="poolinfo"></div>

    <div id="seed"></div>
  </div>

  <div>
    <div class="log-head"><h2>Encounter Log</h2><button id="broadcast">📺 Player View</button><button id="clear">Clear Log</button></div>
    <div class="log" id="log"></div>
  </div>
</div>

<script src="../shared/dice.js"></script>
<script src="../shared/tables.js"></script>
<script src="../shared/grades.js"></script>
<script src="../shared/data.js"></script>
<script src="../data/ptolus-encounters.js"></script>
<script src="../shared/state.js"></script>
<script src="../shared/ui.js"></script>
<script>
UI.mountHead('Encounter Generator', 'Database combats or canonical Ptolus tables');
UI.contextBar();
UI.diceTray();
UI.seedControl('seed');
const log = UI.logger('log', 'clear');
UI.broadcastButton('broadcast', log);
let lastEncounter = null; // picks from the most recent database roll

const REGION_LABELS = {};
document.querySelectorAll('#region option').forEach(o => REGION_LABELS[o.value] = o.textContent);
const CITY_REGIONS = ['ptolus_streets', 'ptolus_undercity', 'ptolus_docks', 'urban'];

// populate district dropdown for table mode
PTOLUS_ENC.districts.forEach(d => {
  const o = document.createElement('option'); o.value = d; o.textContent = d;
  if (d === 'Docks') o.selected = true;
  UI.el('district').appendChild(o);
});

/* ---------- Database mode ---------- */
function poolFor(region) {
  return DATA.monsters.filter(m =>
    Array.isArray(m.environments) && m.cr_value > 0 &&
    (m.environments.indexOf(region) !== -1 || m.environments.indexOf('any') !== -1));
}
function pickNearCR(pool, targetCR) {
  if (!pool.length) return null;
  for (let tol = 0.5; tol <= 25; tol += 1) {
    const cands = pool.filter(m => Math.abs(m.cr_value - targetCR) <= tol);
    if (cands.length) return Dice.pick(cands);
  }
  return pool.slice().sort((a, b) => Math.abs(a.cr_value - targetCR) - Math.abs(b.cr_value - targetCR))[0];
}
function build(region, targetEL) {
  const pool = poolFor(region);
  if (!pool.length) return null;
  const picks = [];
  const template = Dice.pick(['single', 'single', 'pair', 'group']);
  if (template === 'single') {
    const m = pickNearCR(pool, targetEL); if (m) picks.push(m);
  } else if (template === 'pair') {
    const base = pickNearCR(pool, targetEL - 2); if (base) picks.push(base, base);
  } else {
    const count = Dice.range(4, 6);
    const mook = pickNearCR(pool, Math.max(0.25, targetEL - 4));
    if (mook) for (let i = 0; i < count; i++) picks.push(mook);
    if (Dice.coinFlip()) {
      const leader = pickNearCR(pool.filter(m => m !== mook), targetEL - 2) || pickNearCR(pool, targetEL - 2);
      if (leader) picks.push(leader);
    }
  }
  if (!picks.length) { const m = pickNearCR(pool, targetEL); if (m) picks.push(m); }
  return picks.length ? picks : null;
}
function tally(picks) {
  const map = new Map();
  picks.forEach(m => { const e = map.get(m.name) || { m: m, n: 0 }; e.n++; map.set(m.name, e); });
  return [...map.values()];
}
function generateDB() {
  const region = UI.el('region').value;
  const plevel = Math.max(1, Math.min(20, parseInt(UI.el('plevel').value, 10) || 1));
  const offset = parseInt(UI.el('offset').value, 10);
  const targetEL = Math.max(1, plevel + offset);
  const picks = build(region, targetEL);
  const header = '[' + REGION_LABELS[region].toUpperCase() + ' — Party Lvl ' + plevel + ' — Target EL ' + targetEL + ']';
  if (!picks) {
    log.append('<span class="head">' + UI.esc(header) + '</span>\n' +
      '<span class="bad">No suitable monsters in database for this region. Add entries to srd/monsters/monsters.json (then rerun build-data.py).</span>');
    return;
  }
  lastEncounter = picks;
  const groups = tally(picks);
  const lines = groups.map(g =>
    '<a href="../codex/index.html#monsters:' + encodeURIComponent(g.m.name) + '" target="_blank">' + UI.esc(g.m.name) + '</a>' +
    ' (CR ' + g.m.cr + ')' + (g.n > 1 ? ' ×' + g.n : ''));
  const el = Tables.elFromCRs(picks.map(m => m.cr_value));
  const t = Tables.treasureValueByEL(el);
  let out = '<span class="head">' + UI.esc(header) + '</span>\n' + lines.join('\n') + '\n' +
    '<span class="muted">→ approx EL ' + el + '</span>\n' +
    '<span class="muted">→ Avg loot: ' + Tables.gp(t.coins_gp) + ' coins | ' + Tables.gp(t.goods_gp) + ' goods | ' + Tables.gp(t.items_gp) + ' items</span>';
  if (CITY_REGIONS.indexOf(region) !== -1) {
    const toughest = picks.slice().sort((a, b) => b.cr_value - a.cr_value)[0];
    const g = GRADES.classify(toughest.name, toughest.cr_value);
    if (g) out += '\n<span class="muted">→ Watch: ' + g.grade + ' (' + UI.esc(toughest.name) + ') — ' + g.response.toLowerCase() + ' in ' + g.responseDice + '</span>';
  }
  log.append(out);
}

/* ---------- Ptolus Tables mode ---------- */
function entryLine(e) { return e.t + (e.cr ? ' <span class="muted">[CR ' + e.cr + ']</span>' : ''); }
function generateTables() {
  const zone = UI.el('zone').value;
  if (zone === 'sewer') {
    const r = Dice.range(1, 20);
    log.append('<span class="head">[SEWERS — d20=' + r + ']</span>\n' + entryLine(PTOLUS_ENC.sewer[r - 1]));
  } else if (zone === 'labyrinth') {
    const r = Dice.range(1, 12);
    log.append('<span class="head">[GHUL\'S LABYRINTH — d12=' + r + ']</span>\n' + entryLine(PTOLUS_ENC.labyrinth[r - 1]));
  } else if (zone === 'necropolis') {
    const e = Dice.pick(PTOLUS_ENC.necropolis);
    log.append('<span class="head">[NECROPOLIS — night]</span>\n' + entryLine(e));
  } else {
    const district = UI.el('district').value;
    const time = UI.el('time').value;
    const tone = PTOLUS_ENC.districtTone[district] || {};
    const weighted = Object.keys(tone).map(type => {
      let w = tone[type];
      if (time === 'night' && PTOLUS_ENC.nightBoost[type] != null) w *= PTOLUS_ENC.nightBoost[type];
      return { value: type, weight: w };
    }).filter(x => x.weight > 0);
    const type = Dice.weightedPick(weighted);
    const text = Dice.pick(PTOLUS_ENC.street[type]);
    log.append('<span class="head">[CITY STREET — ' + district + ' — ' + (time === 'night' ? 'Night' : 'Day') + ']</span>\n' +
      '<span class="muted">' + type + ':</span> ' + text);
  }
}

function generate() { UI.el('source').value === 'tables' ? generateTables() : generateDB(); }
UI.el('roll').addEventListener('click', generate);

// Hand off the last database encounter to the Combat Tracker (HP + init pre-rolled)
function sendToCombat() {
  if (!lastEncounter || !lastEncounter.length) {
    log.append('<span class="bad">Roll a database encounter first (table mode has no stat blocks to send).</span>');
    return;
  }
  const counts = {}; lastEncounter.forEach(m => counts[m.name] = (counts[m.name] || 0) + 1);
  const seen = {};
  const combatants = lastEncounter.map(m => {
    let hp = m.hp; try { if (m.hd) hp = Dice.d(m.hd.replace(/\s/g, '')); } catch (e) {}
    hp = Math.max(1, hp);
    let name = m.name;
    if (counts[m.name] > 1) { seen[m.name] = (seen[m.name] || 0) + 1; name = m.name + ' ' + seen[m.name]; }
    return { name: name, srcName: m.name, hp: hp, maxhp: hp, init: Dice.roll(20) + (m.initiative || 0), cr: m.cr };
  });
  try { localStorage.setItem('ptolus-pending-encounter', JSON.stringify({ combatants: combatants, ts: Date.now() })); } catch (e) {}
  log.append('<span class="good">✓ Sent ' + combatants.length + ' combatant(s) to the Combat Tracker (HP + initiative rolled). Open Combat Tracker → "Import Encounter".</span>');
}
UI.el('tocombat').addEventListener('click', sendToCombat);

/* ---------- UI wiring ---------- */
function syncMode() {
  const tables = UI.el('source').value === 'tables';
  UI.el('db-controls').style.display = tables ? 'none' : 'block';
  UI.el('table-controls').style.display = tables ? 'block' : 'none';
  updateHint();
}
function syncZone() {
  UI.el('street-extra').style.display = UI.el('zone').value === 'street' ? 'block' : 'none';
}
function updateHint() {
  if (UI.el('source').value === 'tables') {
    UI.el('poolinfo').textContent = 'Rolling canonical / homebrew Ptolus encounter tables (see srd/ptolus/encounter-tables.md).';
  } else {
    const r = UI.el('region').value;
    UI.el('poolinfo').textContent = poolFor(r).length + ' monsters tagged for ' + REGION_LABELS[r] + '.';
  }
}
UI.el('source').addEventListener('change', syncMode);
UI.el('zone').addEventListener('change', syncZone);
UI.el('region').addEventListener('change', updateHint);
syncMode(); syncZone();
</script>
</body>
</html>
