<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Imperial Calendar — Ptolus Runner</title>
<link rel="stylesheet" href="../shared/ui.css">
<style>
  .wrap { padding:16px 20px 60px; max-width:900px; }
  .today { background:linear-gradient(90deg,#2a2412,var(--bg-panel)); border:1px solid var(--gold-dim); border-radius:8px; padding:18px 22px; }
  .today .date { font-size:30px; color:var(--gold); font-weight:bold; }
  .today .meta { color:var(--muted); margin-top:4px; }
  .today .holy { color:var(--good); font-weight:bold; margin-top:8px; }
  .controls { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:14px 0; }
  .controls button { padding:8px 12px; }
  .setrow { display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; margin:10px 0; padding:12px; background:var(--bg-panel); border:1px solid var(--line); border-radius:8px; }
  .setrow .f { display:flex; flex-direction:column; }
  .setrow label { margin:0 0 3px; } .setrow input, .setrow select { width:auto; }
  h2.sec { color:var(--gold); font-size:14px; text-transform:uppercase; letter-spacing:2px; border-bottom:1px solid var(--line); margin:22px 0 10px; padding-bottom:5px; }
  .hint2 { color:var(--muted); font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="today">
    <div class="date" id="date"></div>
    <div class="meta" id="meta"></div>
    <div class="holy" id="holytoday"></div>
  </div>

  <div class="controls">
    <button id="m1d">− 1 day</button>
    <button class="primary" id="p1d" style="width:auto;margin:0;">+ 1 day</button>
    <button id="p1w">+ 1 week</button>
    <button id="p1m">+ 1 month</button>
    <input id="advn" type="number" value="7" style="width:70px"><button id="advgo">Advance days</button>
    <span style="margin-left:auto"></span>
    <span class="hint2" id="campday"></span>
  </div>

  <div class="setrow">
    <div class="f"><label>Day</label><input id="sd" type="number" min="1" max="31" style="width:60px"></div>
    <div class="f"><label>Month</label><select id="sm"></select></div>
    <div class="f"><label>Year (IA)</label><input id="sy" type="number" style="width:90px"></div>
    <button id="setdate">Set Date</button>
    <button id="setstart">Set as Campaign Start</button>
    <button id="reset">Reset (1 Newyear 721)</button>
  </div>

  <h2 class="sec">This Month</h2>
  <div id="monthinfo"></div>

  <h2 class="sec">Upcoming Holy &amp; Special Days</h2>
  <table class="ref" id="upcoming"></table>

  <p class="hint2" style="margin-top:16px;">Year 721 IA. Months map to real-world Jan–Dec lengths so canonical holy days (e.g. 31st of Harvest) land correctly. Weekday anchored to 1st of Newyear, 721 IA = Theoday. Source: Ptolus pp. 28–29, 547. Saved in this browser.</p>
</div>

<script src="../shared/ui.js"></script>
<script>
UI.mountHead('Imperial Calendar', 'Track the date, holy days, and campaign time');
UI.diceTray();

const MONTHS = [
  { n: 'Newyear', len: 31, season: 'Midwinter', note: 'Cold and dark; the new year.' },
  { n: 'Birth', len: 28, season: 'Late winter', note: 'Ice begins to break.' },
  { n: 'Wind', len: 31, season: 'Early spring', note: 'Frequent storms off the Whitewind Sea.' },
  { n: 'Rain', len: 30, season: 'Spring', note: 'Rainy season begins; heaviest rainfall.' },
  { n: 'Bloom', len: 31, season: 'Late spring', note: 'Flowers; the most pleasant shoulder season.' },
  { n: 'Sun', len: 30, season: 'Early summer', note: 'Warmest, brightest stretch.' },
  { n: 'Growth', len: 31, season: 'Midsummer', note: 'Long days; midsummer festivals.' },
  { n: 'Blessing', len: 31, season: 'Late summer', note: 'High ~69°F / Low ~53°F; ~1.2 in. rain.' },
  { n: 'Toil', len: 30, season: 'Early fall', note: 'High ~60°F / Low ~48°F; ~1.9 in. rain.' },
  { n: 'Harvest', len: 31, season: 'Fall', note: 'High ~51°F / Low ~41°F; ~3.3 in. rain.' },
  { n: 'Moons', len: 30, season: 'Late fall', note: 'High ~48°F / Low ~39°F; ~5.7 in. rain; gloomy.' },
  { n: 'Yearsend', len: 31, season: 'Early winter', note: 'High ~46°F / Low ~31°F; ~6.0 in. rain; harshest month. It rains more than it snows.' },
];
const WEEKDAYS = ['Theoday', 'Kingsday', 'Airday', 'Waterday', 'Earthday', 'Fireday', 'Queensday'];
const YEARLEN = MONTHS.reduce((a, m) => a + m.len, 0); // 365
const HOLY = [
  { m: 1, d: 1, name: "Newyear's Day", grp: 'City', desc: 'Celebration; babies born today are lucky.' },
  { m: 1, d: 21, name: 'Litorian Great Feast (midwinter)', grp: 'Litorian', desc: 'Feasting and contests; a Chieftain of the Feast is named.' },
  { m: 4, d: 5, name: 'Godsday', grp: 'City', desc: 'Holiest day in most religions; huge Temple District festival, many get the day off.' },
  { m: 6, d: 10, name: 'Day of Joining', grp: 'City', desc: 'Lucky for ventures, alliances, marriages, new adventuring parties.' },
  { m: 7, d: 21, name: 'Litorian Great Feast (midsummer)', grp: 'Litorian', desc: 'Tribes gather for feasting and storytelling.' },
  { m: 8, d: 14, name: "Brightfather's Day", grp: 'City', desc: 'Church of Lothian high holy day. Feasting, family, peace with enemies. Watch thins around the Temple District; crime spikes elsewhere.' },
  { m: 9, d: 12, name: 'Litorian Days of Memory (12th–14th)', grp: 'Litorian', desc: 'Warriors honor fallen enemies; spoils go to the dead.' },
  { m: 10, d: 31, name: 'Harvest Festival', grp: 'City', desc: 'Feasting, dancing, masked historical plays. Secular and joyful.' },
  { m: 11, d: 2, name: 'Litorian Winter Fast (2nd–5th)', grp: 'Litorian', desc: 'Blooded warriors fast four days, then hunt and eat raw.' },
  { m: 11, d: 23, name: 'Festival of Cold Moons (Chaokaemus)', grp: 'City', desc: 'Humans: ill omens, warding the dead. Elves: rejuvenation and good omens. Celebrated separately.' },
  { m: 12, d: 28, name: 'Cursed Day', grp: 'City', desc: 'Babies born on the 28th of Yearsend are considered cursed.' },
];

const KEY = 'ptolus-calendar-v1';
let state = load();
function load() {
  try { const s = JSON.parse(localStorage.getItem(KEY)); if (s && s.cur) return s; } catch (e) {}
  return { cur: { y: 721, m: 1, d: 1 }, start: { y: 721, m: 1, d: 1 } };
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

function monthStartOffset(m) { let o = 0; for (let i = 0; i < m - 1; i++) o += MONTHS[i].len; return o; }
function absDays(dt) { return dt.y * YEARLEN + monthStartOffset(dt.m) + (dt.d - 1); }
function fromAbs(t) {
  const y = Math.floor(t / YEARLEN); let rem = t - y * YEARLEN; let m = 1;
  while (rem >= MONTHS[m - 1].len) { rem -= MONTHS[m - 1].len; m++; }
  return { y: y, m: m, d: rem + 1 };
}
const ANCHOR = absDays({ y: 721, m: 1, d: 1 });
function weekday(dt) { return WEEKDAYS[((absDays(dt) - ANCHOR) % 7 + 7) % 7]; }
function ord(n) { const s = ['th', 'st', 'nd', 'rd'], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }
function fmt(dt) { return ord(dt.d) + ' of ' + MONTHS[dt.m - 1].n + ', ' + dt.y + ' IA'; }

function advance(days) { state.cur = fromAbs(absDays(state.cur) + days); clampDay(); save(); render(); }
function clampDay() { const len = MONTHS[state.cur.m - 1].len; if (state.cur.d > len) state.cur.d = len; if (state.cur.d < 1) state.cur.d = 1; }

function holyOn(dt) { return HOLY.filter(h => h.m === dt.m && h.d === dt.d); }
function nextOccurrence(h) {
  const today = absDays(state.cur);
  let a = absDays({ y: state.cur.y, m: h.m, d: h.d });
  if (a < today) a = absDays({ y: state.cur.y + 1, m: h.m, d: h.d });
  return a - today;
}

function render() {
  const cur = state.cur, mo = MONTHS[cur.m - 1];
  UI.el('date').textContent = weekday(cur) + ', ' + fmt(cur);
  UI.el('meta').textContent = mo.season + ' · ' + mo.note;
  const today = holyOn(cur);
  UI.el('holytoday').textContent = today.length ? '★ ' + today.map(h => h.name).join(' · ') + ' — ' + today[0].desc : '';
  const dayN = absDays(cur) - absDays(state.start) + 1;
  UI.el('campday').textContent = 'Campaign day ' + dayN + ' (start: ' + fmt(state.start) + ')';

  UI.el('monthinfo').innerHTML =
    '<div class="line"><b style="color:var(--gold)">' + mo.n + '</b> — ' + mo.season + ', ' + mo.len + ' days. ' + mo.note + '</div>' +
    '<div class="hint2">Holy/special days this month: ' + (HOLY.filter(h => h.m === cur.m).map(h => ord(h.d) + ' ' + h.name).join('; ') || 'none') + '</div>';

  const up = HOLY.map(h => ({ h: h, inDays: nextOccurrence(h) })).sort((a, b) => a.inDays - b.inDays).slice(0, 7);
  UI.el('upcoming').innerHTML = '<tr><th>In</th><th>Date</th><th>Day</th><th>Observance</th></tr>' +
    up.map(u => '<tr><td>' + (u.inDays === 0 ? 'today' : u.inDays + ' d') + '</td><td>' + ord(u.h.d) + ' of ' + MONTHS[u.h.m - 1].n +
      '</td><td>' + weekday({ y: u.inDays < nextYearMark(u.h) ? state.cur.y : state.cur.y + 1, m: u.h.m, d: u.h.d }) +
      '</td><td>' + UI.esc(u.h.name) + ' <span class="hint2">(' + u.h.grp + ')</span><br><span class="hint2">' + UI.esc(u.h.desc) + '</span></td></tr>').join('');
}
function nextYearMark(h) { return absDays({ y: state.cur.y, m: h.m, d: h.d }) >= absDays(state.cur) ? 9999 : 0; }

// month dropdown
MONTHS.forEach((m, i) => { const o = document.createElement('option'); o.value = i + 1; o.textContent = (i + 1) + '. ' + m.n; UI.el('sm').appendChild(o); });

UI.el('m1d').addEventListener('click', () => advance(-1));
UI.el('p1d').addEventListener('click', () => advance(1));
UI.el('p1w').addEventListener('click', () => advance(7));
UI.el('p1m').addEventListener('click', () => advance(MONTHS[state.cur.m - 1].len));
UI.el('advgo').addEventListener('click', () => advance(parseInt(UI.el('advn').value, 10) || 0));
UI.el('setdate').addEventListener('click', () => {
  const m = parseInt(UI.el('sm').value, 10) || 1;
  state.cur = { y: parseInt(UI.el('sy').value, 10) || 721, m: m, d: Math.min(parseInt(UI.el('sd').value, 10) || 1, MONTHS[m - 1].len) };
  save(); render();
});
UI.el('setstart').addEventListener('click', () => { state.start = Object.assign({}, state.cur); save(); render(); });
UI.el('reset').addEventListener('click', () => { state = { cur: { y: 721, m: 1, d: 1 }, start: { y: 721, m: 1, d: 1 } }; save(); render(); syncInputs(); });
function syncInputs() { UI.el('sd').value = state.cur.d; UI.el('sm').value = state.cur.m; UI.el('sy').value = state.cur.y; }

syncInputs();
render();
</script>
</body>
</html>
