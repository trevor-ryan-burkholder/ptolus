<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reference Library — Ptolus Runner</title>
<link rel="stylesheet" href="../shared/ui.css">
<style>
  .lib { display:grid; grid-template-columns:300px 1fr; height:calc(100vh - 56px); }
  @media (max-width:760px){ .lib{ grid-template-columns:1fr; height:auto; } .sidebar{ max-height:40vh; } }
  .sidebar { border-right:1px solid var(--line); overflow-y:auto; padding:12px; }
  .sidebar input { margin-bottom:10px; }
  .grp { color:var(--gold); font-size:12px; text-transform:uppercase; letter-spacing:1.5px; margin:14px 0 4px; border-bottom:1px solid var(--line); padding-bottom:3px; }
  .doc-link { display:block; padding:5px 8px; border-radius:5px; color:var(--text); text-decoration:none; font-size:14px; cursor:pointer; line-height:1.3; }
  .doc-link:hover { background:var(--bg-input); }
  .doc-link.active { background:var(--gold); color:#1a1a1a; font-weight:bold; }
  .doc-link .hit { color:var(--muted); font-size:12px; }
  .doc-link.active .hit { color:#3a3000; }
  .content { overflow-y:auto; padding:8px 32px 60px; }
  .content .crumbs { color:var(--muted); font-size:13px; margin:14px 0 4px; }
  .content .crumbs a { cursor:pointer; }
  /* rendered markdown */
  .md { max-width:820px; line-height:1.55; }
  .md h1 { color:var(--gold); font-size:28px; border-bottom:2px solid var(--gold-dim); padding-bottom:6px; }
  .md h2 { color:var(--gold); font-size:21px; margin-top:26px; border-bottom:1px solid var(--line); padding-bottom:4px; }
  .md h3 { color:var(--gold); font-size:17px; margin-top:20px; }
  .md h4,.md h5,.md h6 { color:var(--text); font-size:15px; margin-top:16px; }
  .md p { margin:10px 0; }
  .md a { color:var(--gold); }
  .md code { background:#141414; border:1px solid var(--line); border-radius:4px; padding:1px 5px; font-size:14px; }
  .md pre { background:#141414; border:1px solid var(--line); border-radius:6px; padding:12px; overflow-x:auto; }
  .md pre code { border:none; padding:0; background:none; }
  .md blockquote { border-left:3px solid var(--gold-dim); margin:10px 0; padding:2px 14px; color:var(--muted); }
  .md ul,.md ol { padding-left:24px; }
  .md li { margin:3px 0; }
  .md hr { border:none; border-top:1px solid var(--line); margin:18px 0; }
  .md table.ref { margin:12px 0; }
  .nores { color:var(--muted); font-style:italic; padding:8px; }
</style>
</head>
<body>
<div class="lib">
  <div class="sidebar">
    <input id="search" placeholder="Search all docs…" autofocus>
    <div id="list"></div>
  </div>
  <div class="content">
    <div class="crumbs" id="crumbs"></div>
    <div class="md" id="doc"></div>
  </div>
</div>

<script src="../shared/markdown.js"></script>
<script src="../shared/docs.js"></script>
<script src="../shared/ui.js"></script>
<script>
UI.mountHead('Reference Library', DOCS.length + ' docs · rules, lore, specs');
UI.diceTray();
const byId = {};
DOCS.forEach(d => byId[d.id] = d);

function renderList(query) {
  const q = (query || '').toLowerCase().trim();
  const list = UI.el('list');
  let matches = DOCS.map(d => {
    if (!q) return { d: d, hit: '' };
    const inTitle = d.title.toLowerCase().indexOf(q) !== -1;
    const inBody = q.length >= 3 && d.body.toLowerCase().indexOf(q) !== -1;
    if (!inTitle && !inBody) return null;
    return { d: d, hit: (!inTitle && inBody) ? 'text match' : '' };
  }).filter(Boolean);

  if (!matches.length) { list.innerHTML = '<div class="nores">No docs match "' + UI.esc(q) + '".</div>'; return; }
  let html = '';
  DOC_GROUPS.forEach(g => {
    const inGroup = matches.filter(m => m.d.group === g);
    if (!inGroup.length) return;
    html += '<div class="grp">' + UI.esc(g) + '</div>';
    inGroup.forEach(m => {
      html += '<a class="doc-link" data-id="' + m.d.id + '">' + UI.esc(m.d.title) +
        (m.hit ? ' <span class="hit">· ' + m.hit + '</span>' : '') + '</a>';
    });
  });
  list.innerHTML = html;
  markActive();
}

function markActive() {
  const cur = location.hash.slice(1);
  document.querySelectorAll('.doc-link').forEach(a => a.classList.toggle('active', a.getAttribute('data-id') === cur));
}

function show(id) {
  const d = byId[id];
  if (!d) { UI.el('doc').innerHTML = '<p class="nores">Pick a document from the list.</p>'; UI.el('crumbs').textContent = ''; return; }
  UI.el('crumbs').innerHTML = UI.esc(d.group) + ' &nbsp;·&nbsp; <code>' + UI.esc(d.path) + '</code>';
  UI.el('doc').innerHTML = Markdown.render(d.body);
  UI.el('content') && (UI.el('content').scrollTop = 0);
  document.querySelector('.content').scrollTop = 0;
  markActive();
}

UI.el('list').addEventListener('click', e => {
  const a = e.target.closest('.doc-link'); if (!a) return;
  location.hash = a.getAttribute('data-id');
});
UI.el('search').addEventListener('input', e => renderList(e.target.value));
window.addEventListener('hashchange', () => { show(location.hash.slice(1)); });

renderList('');
show(location.hash.slice(1) || DOCS[0].id);
if (!location.hash) location.hash = DOCS[0].id;
</script>
</body>
</html>
